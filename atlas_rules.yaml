# Atlas Watchdog - 異常検知ルール定義
# 場中(22:30-05:00 JST)に常駐し、ログを解析して異常を自律対応する
#
# Level1: INFO通知のみ（対応不要）
# Level2: 原因仮説+builder自動投入（再起動/修正）- DRY_RUN対応
# Level3: Bot即停止+ALERT通知 - DRY_RUN対応
# Level4: 発注キャンセル+手動待ち - DRY_RUN対応
#
# window_sec: パターン計数の時間窓（秒）
# threshold: その窓内で同一パターンが何回出たらトリガーか
# cooldown_sec: 一度発火後、次に再発火できるまでの秒数（通知スパム防止）

log_sources:
  condor: /Users/yuusakuichio/trading/data/logs/condor.log
  spybot_stderr: /Users/yuusakuichio/trading/data/logs/spybot_stderr.log
  spybot_stdout: /Users/yuusakuichio/trading/data/logs/spybot_stdout.log

# 監視対象LaunchAgent（Level2の再起動対象）
bot_launchagent: com.spybot.paper
bot_pid_files:
  - /Users/yuusakuichio/trading/logs/spy_bot_paper.pid
  - /Users/yuusakuichio/trading/logs/spy_bot_live.pid

# Bot内部状態stale判定：最後のログ行からこの秒数経過したらstale
stale_log_sec: 180

# 場中時間窓（JST）
market_window:
  start: "22:25"  # ETオープン5分前
  end: "05:05"    # ETクローズ5分後

rules:
  # ── Level 1: INFO通知のみ ─────────────────────────────────────
  - id: mass_verify_warning_burst
    description: MassVerifyのWARNINGが短時間に集中（Bot設計が複雑化してる可能性）
    level: 1
    pattern: '\[MassVerify\].*エグジット確認例外'
    window_sec: 300
    threshold: 20
    cooldown_sec: 1800

  # ── 新戦術 Level 1: 正常エントリー通知 ──────────────────────────────────────

  - id: ic_sell_entry_normal
    description: IC売り (IronCondorSellEngine) エントリー成功（正常系）
    level: 1
    pattern: '\[IC_SELL\].*(entry|エントリー).*(success|ok)|IronCondor.*placed'
    window_sec: 120
    threshold: 1
    cooldown_sec: 3600

  - id: butterfly_entry_normal
    description: Butterfly (ButterflyEngine) エントリー成功（正常系）
    level: 1
    pattern: '\[Butterfly\].*(entry|エントリー).*(success|ok)|ButterflyEngine.*placed'
    window_sec: 120
    threshold: 1
    cooldown_sec: 3600

  - id: calendar_entry_normal
    description: Calendar Spread (CalendarEngine) エントリー成功（正常系）
    level: 1
    pattern: '\[CalendarEngine\].*(entry|エントリー).*(success|ok)|CalendarEngine.*placed'
    window_sec: 120
    threshold: 1
    cooldown_sec: 3600

  - id: strangle_entry_normal
    description: Strangle売り (StrangleSellEngine) エントリー成功（正常系）
    level: 1
    pattern: '\[StrangleSell\].*(entry|エントリー).*(success|ok)|StrangleSell.*placed'
    window_sec: 120
    threshold: 1
    cooldown_sec: 3600

  - id: delta_hedge_triggered
    description: Delta Hedge発動（正常系・過剰発動の基準ウォッチ）
    level: 1
    pattern: '\[DeltaHedge\].*(triggered|発動|placed|ヘッジ発動)'
    window_sec: 60
    threshold: 1
    cooldown_sec: 600

  - id: earnings_engine_entry_normal
    description: 決算エンジン (EarningsEngine/IVCrush) エントリー成功（正常系）
    level: 1
    pattern: '\[EarningsEngine\|IVCrush\].*(entry|エントリー).*(success|ok)'
    window_sec: 120
    threshold: 1
    cooldown_sec: 3600

  # ── 新戦術 Level 2: 異常exit/ループ ──────────────────────────────────────────

  - id: ic_sell_chain_fetch_loop
    description: IC売り オプションチェーン取得失敗が連続（データ品質問題）
    level: 2
    pattern: '\[IC_SELL\].*(chain.*fail|チェーン取得失敗|option chain error)'
    window_sec: 300
    threshold: 5
    cooldown_sec: 900
    hypothesis: "moomoo API側のオプションチェーン取得制限または期限切れオプション"
    action:
      type: notify_only
      post_verify_sec: 60

  - id: butterfly_abnormal_exit
    description: Butterfly 異常exitが連続（wing strike計算バグの兆候）
    level: 2
    pattern: '\[Butterfly\].*(abnormal|異常|HALT|stop_loss|損切り).*exit'
    window_sec: 180
    threshold: 3
    cooldown_sec: 900
    hypothesis: "wing_width計算またはATR取得バグ。strike選択がズレている可能性"
    action:
      type: restart_bot
      pre_checks:
        - no_open_orders
      post_verify_sec: 120

  - id: calendar_chain_miss_loop
    description: Calendar Spread バックレッグのチェーン取得失敗が連続
    level: 2
    pattern: '\[CalendarEngine\].*(back.*chain|バックレッグ).*(fail|miss|なし|取得失敗)'
    window_sec: 300
    threshold: 8
    cooldown_sec: 900
    hypothesis: "7DTE expiry日が存在しないまたはmoomooで取引不可"
    action:
      type: notify_only
      post_verify_sec: 60

  - id: strangle_delta_miss_loop
    description: Strangle売り delta該当ストライクなしが連続（チェーン品質問題）
    level: 2
    pattern: '\[StrangleSell\].*(delta.*miss|delta.*not found|デルタ.*なし|delta_tolerance)'
    window_sec: 180
    threshold: 5
    cooldown_sec: 900
    hypothesis: "オプションチェーンのdelta値が取得できていない。スナップショット取得確認"
    action:
      type: notify_only
      post_verify_sec: 60

  - id: delta_hedge_over_trigger
    description: Delta Hedge が1時間に設計上限を超えて発動（PDT消費リスク）
    level: 2
    pattern: '\[DeltaHedge\].*(triggered|発動)'
    window_sec: 3600
    threshold: 4
    cooldown_sec: 1800
    hypothesis: "ポートフォリオデルタ計算にバグ。または市場が急変動でunwind閾値を跨ぎ続けている"
    action:
      type: notify_only
      post_verify_sec: 120

  - id: earnings_engine_data_miss
    description: 決算エンジン IVクラッシュ率データ不足が連続（Finnhub API問題の可能性）
    level: 2
    pattern: '\[EarningsEngine\|IVCrush\].*(iv_crush.*miss|crush_rate.*none|データなし)'
    window_sec: 300
    threshold: 5
    cooldown_sec: 1800
    hypothesis: "Finnhub APIキー制限またはearnings_calendar.pyの日付計算バグ"
    action:
      type: notify_only
      post_verify_sec: 60

  # ── 新戦術 Level 3: 異常ループ検知 ──────────────────────────────────────────

  - id: ic_sell_consecutive_loss_halt
    description: IC売りが連続損失上限(3連敗)に達してBot内部でhalt（異常確認）
    level: 3
    pattern: '\[IC_SELL\].*(consecutive.*loss|連続損失|3回連続|max_consecutive)'
    window_sec: 60
    threshold: 1
    cooldown_sec: 3600
    hypothesis: "市場環境がIC売りの想定外のレンジを破った。strategy_selectorの環境判定確認"
    action:
      type: stop_bot
      create_issue: true

  - id: butterfly_wing_calc_error_loop
    description: Butterfly wing幅計算エラーが連続（ATR取得バグ）
    level: 3
    pattern: '\[Butterfly\].*(wing.*calc.*error|calc_butterfly_wing_width.*exception)'
    window_sec: 120
    threshold: 5
    cooldown_sec: 1800
    hypothesis: "calc_butterfly_wing_width()でATR取得失敗またはNone参照エラー"
    action:
      type: stop_bot
      create_issue: true

  - id: delta_hedge_pdt_exhausted
    description: Delta Hedge PDT枠を使い切った（週次上限超過・手動確認必要）
    level: 3
    pattern: '\[DeltaHedge\].*(PDT.*exhausted|PDT.*limit|weekly_pdt_budget|pdt.*枠.*使い切)'
    window_sec: 60
    threshold: 1
    cooldown_sec: 7200
    hypothesis: "weekly_pdt_budget=3を超えてDeltaHedgeが発動しようとした。$25K未満口座でのPDT上限"
    action:
      type: notify_only
      create_issue: true

  - id: earnings_abnormal_exit_loop
    description: 決算エンジン 異常exitが連続（決算発表タイミングの予測バグ）
    level: 3
    pattern: '\[EarningsEngine\|IVCrush\].*(abnormal|abort|HALT|異常終了)'
    window_sec: 120
    threshold: 3
    cooldown_sec: 3600
    hypothesis: "決算発表タイミングの計算バグ。earnings_calendar.pyのhour判定確認"
    action:
      type: stop_bot
      create_issue: true

  # ── Level 2: builder自動投入 ─────────────────────────────────
  - id: strike_mismatch_loop
    description: strike不整合が連続発生（注文ロジック破綻の兆候）
    level: 2
    pattern: 'strike.*(mismatch|不整合|not found|見つからない)'
    window_sec: 180
    threshold: 5
    cooldown_sec: 900
    hypothesis: "OpenD/moomoo のoption chainとBot内部のstrike計算にズレ。chain再取得ロジック確認"
    action:
      type: restart_bot
      pre_checks:
        - no_open_orders
      post_verify_sec: 120

  - id: gamma_early_exit_loop
    description: GammaEarlyExit が無限ループ的に発火（損失拡大リスク）
    level: 2
    pattern: 'GammaEarlyExit'
    window_sec: 120
    threshold: 10
    cooldown_sec: 1800
    hypothesis: "Γ閾値計算にバグ、or ポジション状態更新が効いていない"
    action:
      type: restart_bot
      pre_checks:
        - no_open_orders
      post_verify_sec: 180

  - id: infinite_retry
    description: 同一APIコールを大量リトライ（rate limit/接続断の可能性）
    level: 2
    pattern: '(retry|リトライ).*(\d+回目|attempt \d+)'
    window_sec: 60
    threshold: 15
    cooldown_sec: 600
    hypothesis: "OpenD接続断、またはmoomoo API制限"
    action:
      type: restart_bot
      pre_checks:
        - no_open_orders
        - opend_connected
      post_verify_sec: 120

  - id: api_rejection_cluster
    description: API拒否が連続（認証切れ、moomoo側制限）
    level: 2
    pattern: '(API.*(reject|denied|拒否)|ErrCode.*-\d+)'
    window_sec: 120
    threshold: 8
    cooldown_sec: 900
    hypothesis: "moomoo API認証失効、またはリクエスト過多"
    action:
      type: notify_only
      post_verify_sec: 60

  # ── Level 3: Bot即停止 ────────────────────────────────────────
  - id: unhandled_exception_cascade
    description: 未捕捉例外が連鎖（Bot論理破綻）
    level: 3
    pattern: '(Traceback \(most recent call last\)|CRITICAL|FATAL)'
    window_sec: 60
    threshold: 3
    cooldown_sec: 1800
    hypothesis: "未捕捉例外連鎖。状態破壊の可能性"
    action:
      type: stop_bot
      create_issue: true

  - id: position_count_anomaly
    description: 建玉数が設計上限を超えた（サイジングバグ）
    level: 3
    pattern: '(position.*count|建玉数).*(\d+).*(?:exceed|超過|上限)'
    window_sec: 30
    threshold: 1
    cooldown_sec: 3600
    hypothesis: "サイジングロジックにバグ。損失無制限リスク"
    action:
      type: stop_bot
      create_issue: true

  - id: bot_process_stale
    description: Botプロセス稼働中だがログが長時間更新されていない（デッドロック）
    level: 3
    synthetic: bot_stale  # 正規表現ではなく内部判定
    cooldown_sec: 900
    hypothesis: "デッドロックor無限ループ。ログ出力停止"
    action:
      type: restart_bot
      pre_checks:
        - no_open_orders
      post_verify_sec: 180

  # ── Level 4: 発注キャンセル+手動待ち ───────────────────────
  - id: order_size_anomaly
    description: 発注サイズが設計上限を超えた（桁間違い等）
    level: 4
    pattern: '(order|発注).*(qty|quantity|size|数量).*(\d{3,})'
    window_sec: 10
    threshold: 1
    cooldown_sec: 3600
    hypothesis: "発注サイズ異常。桁誤りor乗算バグの可能性"
    action:
      type: halt_and_wait
      create_issue: true

autofix:
  # Level2以上のaction実行を許可するか
  # 0=DRY_RUN (通知のみ・actionログに記録)
  # 1=ARMED (実際にrestart/stop実行)
  dry_run_default: 0

  # Two-Man Rule: Level3/4 のアクションは人間の承認が必要
  # ARMED=1 でも Level3/4 は pending_approval: true にして
  # Pushover 応答待ちを挟む。タイムアウト後は自動実行しない（安全側）。
  two_man_rule:
    enabled: true
    min_level: 3              # C7-B1修正: Level2承認機構は未実装(承認受付ループなし)のため
                              # min_level=3に戻して運用継続性を確保。
                              # TODO(C7-B1): GitHub Issue経由の承認受付ループ実装後にmin_level=2に戻す
                              # 実装方針: gh issue list --label approval-pending --json number,comments
                              # でAPPROVE/DENYコメントを5分ポーリング→承認確認後にアクション実行
    level2_approval_required: false  # C7-B1修正: 承認受付ループ未実装のため無効化
                                     # (承認待ちのままブロックされると運用停止リスクがある)
    approval_timeout_sec: 300 # 5分応答なしで実行キャンセル（自動実行しない）
    pushover_priority: 1      # 承認要求は priority=1 (high)
    # 緊急モード例外: market crash検知時のみ Level3 即実行を許可
    emergency_bypass_conditions:
      - "crisis_regime_detected"
      - "kill_switch_activated"

  # GitHub Issue作成時のリポジトリ
  github_repo: yuusakuichio-hash/spy-trading
  github_label_todo: todo
  github_label_hub: hub-command

# ── 戦術パラメータ定義 ────────────────────────────────────────────────────────
# spy_bot.pyの定数と1対1対応。Watchdogが異常検知時の参照に使用。

tactics:
  # ── Calendar Spread パラメータ ──────────────────────────────────────────────
  # エントリー: IVR>P75 かつ VIX 20〜50 かつ VIX5日EMAが下降傾向
  # front: 0DTE ATM売り / back: 7DTE ATM買い（同一strike・異expiry）
  # 対象銘柄: US.SPY / US.QQQ / US.TSLA / US..SPX 等（WHITELIST方式・EXCLUDED_SYMBOLS廃止）
  # [4/17事故対応] excluded_symbols廃止。混入防止はvalidate_code_for_symbol()で物理ブロック
  calendar_sell:
    enabled: true
    excluded_symbols: []  # 空 = 除外なし (WHITELIST方式)
    entry_window_et: "10:30-12:00"
    force_close_et: "15:45"
    vix_min: 20.0
    vix_max: 50.0
    ivr_threshold_percentile: 75    # P75相当のIVRで動的算出
    back_dte: 7                     # backレッグのDTE
    max_risk_pct: 0.02              # 口座の2%を最大リスク（CALENDAR_MAX_RISK_PCT）
    max_qty: 2
    profit_target_iv_crush_pct: 0.10  # front IVが10%以上低下→利確
    stop_loss_pct: 0.30               # 初期debit比30%増で損切り
    pnl_file: "data/calendar_pnl.json"
    # 異常検知: チェーン取得失敗が連続
    watchdog:
      chain_fetch_fail_window_sec: 300
      chain_fetch_fail_threshold: 10

  # ── Strangle Sell パラメータ ─────────────────────────────────────────────────
  # エントリー: IVR>P70(=IVR 60相当) かつ VIX 15〜50
  # OTM Call売り(delta≈0.15) + OTM Put売り(delta≈0.15)
  # 対象銘柄: US.SPY / US.QQQ / US.TSLA / US..SPX 等（WHITELIST方式・EXCLUDED_SYMBOLS廃止）
  # [4/17事故対応] excluded_symbols廃止。混入防止はvalidate_code_for_symbol()で物理ブロック
  strangle_sell:
    enabled: true
    excluded_symbols: []  # 空 = 除外なし (WHITELIST方式)
    entry_window_et: "10:30-12:00"
    force_close_et: "15:45"
    vix_min: 15.0                   # STRANGLE_SELL_VIX_MIN
    vix_max: 50.0                   # STRANGLE_SELL_VIX_MAX
    ivr_min_fallback: 60.0          # STRANGLE_SELL_IVR_MIN（動的P70相当）
    ivr_threshold_percentile: 70    # P70相当のIVRで動的算出
    call_target_delta: 0.15         # STRANGLE_SELL_CALL_DELTA
    put_target_delta: 0.15          # STRANGLE_SELL_PUT_DELTA
    delta_tolerance: 0.05           # STRANGLE_SELL_DELTA_TOL
    profit_target_pct: 0.50         # 受取クレジットの50%で利確
    stop_loss_mult: 2.00            # 受取クレジットの200%でストップ
    max_risk_pct: 0.03              # 口座の3%を最大リスク
    max_qty: 2
    pnl_file: "data/strangle_sell_pnl.json"
    # 異常検知: delta該当なしが連続（チェーン品質問題）
    watchdog:
      delta_miss_window_sec: 180
      delta_miss_threshold: 5

# ══════════════════════════════════════════════════════════════════════════════
# Butterfly戦術パラメータ
# ATM Long Butterfly: 1 buy lower-wing + 2 sell ATM + 1 buy upper-wing
# 適用環境: low IVR (IVR < 30) — IV拡張の裨益を受けない低IV環境向け
# 対象銘柄: SPY/QQQ/META/AMZN/GOOGL etc (US.SPX除外)
# ══════════════════════════════════════════════════════════════════════════════
# ══════════════════════════════════════════════════════════════════════════════
# 銘柄メタ: 全戦術共通 (common/symbol_meta.py の定義と同期)
# [4/17事故対応] strike_interval_map で銘柄別 strike 刻みを明示
# ══════════════════════════════════════════════════════════════════════════════
symbol_meta:
  allowed_universe:
    - "US.SPY"
    - "US..SPX"   # Section 1256 税制優遇・証拠金効率最高 (4/17事故対応で復活)
    - "US.QQQ"
    - "US.IWM"
    - "US.NVDA"
    - "US.TSLA"
    - "US.META"
    - "US.AMZN"
    - "US.GOOGL"
    - "US.AAPL"
    - "US.MSFT"

  strike_interval_map:
    "US.SPY":   1.0
    "US..SPX":  5.0   # CBOEインデックス: $5刻み必須
    "US.QQQ":   1.0
    "US.IWM":   0.5
    "US.NVDA":  2.5
    "US.TSLA":  2.5
    "US.META":  2.5
    "US.AMZN":  2.5
    "US.GOOGL": 2.5
    "US.AAPL":  2.5
    "US.MSFT":  2.5

  # center_strike 混入検知 tolerance (小数)
  center_strike_tolerance_map:
    "US.SPY":   0.20
    "US..SPX":  0.10   # SPX: ±10%で SPY strike ($710) 混入を即検知
    "US.QQQ":   0.20
    "US.IWM":   0.20
    default:    0.25   # 個別株

  # Section 1256 税制優遇対象 (60/40ルール適用)
  section_1256:
    - "US..SPX"

butterfly:
  # グローバルON/OFF
  enable: true

  # IVRフィルタ: IVR < ivr_max でのみエントリー (低IV環境向け)
  # 動的パーセンタイルが利用可能な場合はP30相当を自動算出する
  # フォールバック固定値
  ivr_max_fallback: 30.0

  # Wing幅算出: wing_width = ATR(14) * atr_wing_mult (ストライク刻みに丸め)
  # 銘柄ごとのATRに対して動的に幅を設定する
  atr_wing_mult: 0.40
  min_wing_strikes: 1     # 最小ウィング幅 (strikes数)
  max_wing_strikes: 10    # 最大ウィング幅 (strikes数)

  # Call系/Put系の選択ロジック
  # "call"=常にCall Butterfly / "put"=常にPut Butterfly
  # "dynamic"=SMAトレンドで自動選択（上昇→Call / 下降→Put）
  wing_type: dynamic

  # エントリーウィンドウ (ET)
  entry_start_h: 10
  entry_start_m: 30
  entry_end_h: 14
  entry_end_m: 0

  # エグジット条件
  profit_target_pct: 0.50   # ネットデビットの50%以上の利益で利確
  stop_loss_pct: 1.50        # ネットデビットの150%損失で損切り
  force_close_h: 15          # 15:50 ET 強制決済
  force_close_m: 50

  # サイジング: ネットデビット(コスト)ベース
  # ネットコスト = wing幅 × 100 - ショートプレミアム×200 + ロングプレミアム×200
  # capital_pct: 口座資本のうち何%をネットデビット(リスク)として使うか
  capital_pct: 0.02          # 口座の2%をButterflyコストとして使用
  max_qty: 3                 # 最大3枚
  max_qty_paper: 10          # ペーパーは10枚

  # pre_trade_check用推定証拠金 (Long Butterfly = ネットデビット×100)
  # moomooはLong Butterfly = ネットデビット×枚数×100 相当の証拠金
  # est_margin_per_contract_fallback: 実IVが取れない場合のフォールバック (USD)
  est_margin_per_contract_fallback: 200

# ══════════════════════════════════════════════════════════════════════════════
# 決算日参戦エンジン (EarningsEngine) パラメータ
# 戦術: IV Crush狙い Straddle売り
# データ: Finnhub earnings calendar API (動的取得・固定銘柄リストなし)
# ══════════════════════════════════════════════════════════════════════════════
earnings_engine:
  enable: true

  # エントリー条件
  entry_before_earnings_min: 60      # 決算発表X分前にエントリー
  entry_cutoff_before_close_min: 90  # ET クローズ90分前より遅い後場決算はスキップ
  min_iv_crush_rate: 0.25            # IVクラッシュ率この値未満はスキップ

  # サイズ係数 (IV Crush率から動的算出)
  size_factor_high: 1.2    # crush_rate >= 0.38
  size_factor_mid:  1.0    # crush_rate >= 0.30
  size_factor_low:  0.7    # crush_rate < 0.30

  # デフォルトIVクラッシュ率 (実績データが3件未満の場合に使用)
  # 実績が3件以上になると自動的に実績中央値に切り替わる
  default_crush_rate: 0.28
  symbol_defaults:
    NVDA:  0.40
    TSLA:  0.35
    META:  0.38
    GOOGL: 0.32
    AAPL:  0.30
    MSFT:  0.28
    AMZN:  0.33
    NFLX:  0.38
    AMD:   0.36
    CRM:   0.34

  # Pushover通知 (pre_trade_check通過後)
  pushover_tag: "[Atlas/Earnings]"

# ══════════════════════════════════════════════════════════════════════════════
# VIX Term Structure 戦術パラメータ
# VIX9D/VIX/VIX3M/VIX6Mの比率から環境判定し戦術バイアスを決定する
# ══════════════════════════════════════════════════════════════════════════════
vix_term_structure:
  enable: true

  # term_ratio = VIX9D / VIX3M による環境判定閾値
  # 固定値ではなく比率ベース (0-1スケール) で判定するため環境適応的
  contango_threshold: 0.85    # term_ratio < this → contango → CS売り優先
  backwardation_threshold: 1.05  # term_ratio > this → backwardation → Straddle買い優先

  # 各regimeのサイズ係数
  size_factor_contango:      1.0   # コンタンゴ: CS売りに有利 → フルサイズ
  size_factor_neutral:       0.9   # ニュートラル: やや縮小
  size_factor_backwardation: 0.8   # バックワーデーション: リスク回避縮小

  # spot ratio (VIX9D / VIX) 補助チェック
  spot_ratio_warn: 1.0        # > この値で size_factor × 0.9 追加縮小

  # VIX6M (長期) 追加考慮
  # VIX6M data source: Yahoo Finance %5EVIX6M
  enable_vix6m: true
  vix6m_stress_threshold: 25.0  # VIX6M > 25 → size_factor × 0.9 追加縮小

  # premarket_assessment スコアへの加算/減算
  score_adjustment_contango:      +5    # コンタンゴはCS売り有利環境 → +5点
  score_adjustment_backwardation: -10   # バックワーデーションはリスク環境 → -10点
  score_adjustment_neutral:         0

  # ロギング用PnLファイル
  pnl_file: data/butterfly_pnl.json

# ══════════════════════════════════════════════════════════════════════════════
# IC Sell 戦術パラメータ (IronCondorSellEngine)
# Call CS + Put CS の同時売り。credit受取・max_loss限定。
# 対象銘柄: SPY/QQQ/META/AMZN/GOOGL etc (US.SPX除外・マルチ銘柄対応)
# ══════════════════════════════════════════════════════════════════════════════
ic_sell:
  # グローバルON/OFF
  enable: true

  # エントリー条件（動的算出のベース値）
  vix_min: 18.0          # この VIX 以上でエントリー（低IV環境ではプレミアム不足）
  vix_max: 40.0          # この VIX 以上はスキップ（方向性リスク大）
  ivr_min_percentile: 40.0  # IVR が過去60日の40%ile 以上で有効
  env_score_min: 55.0    # 環境スコア下限（pre_trade_check前フィルタ）

  # デルタ目標（動的算出のベース値）
  call_delta_base: 0.20  # CALL 売りデルタ目標
  put_delta_base: 0.20   # PUT 売りデルタ（絶対値）目標
  # VIX補正: VIX > vix_delta_adj_threshold でデルタを delta_adj 分縮小（守り）
  vix_delta_adj_threshold: 28.0
  delta_adj_high_vix: -0.03   # 高VIX時のデルタ調整値（マイナス=縮小方向）
  # IVR補正: IVR > ivr_delta_adj_threshold でデルタを delta_adj 分拡大（積極的）
  ivr_delta_adj_threshold: 70.0
  delta_adj_high_ivr: 0.03    # 高IVR時のデルタ調整値（プラス=拡大方向）

  # スプレッド幅（ATR × mult で動的算出）
  width_atr_mult: 0.50   # spread_width = ATR_14 * width_atr_mult
  width_min: 1           # 最小幅（ドル / ストライク刻み単位）
  width_default: 5       # ATR 取得失敗時のフォールバック幅

  # 資本配分（Call/Put 合算 max_loss で計算）
  capital_pct_base: 0.40       # 基本資本配分率
  capital_pct_high_vix: 0.30   # VIX >= vix_high_threshold 時の縮小配分
  vix_high_threshold: 28.0     # 配分縮小の VIX 閾値

  # エグジット条件
  profit_target_pct: 0.50    # net_credit の 50% でテイクプロフィット
  stop_loss_mult: 2.0        # net_credit × 2.0 で損切り（spread max_loss 上限）

  # 時刻ウィンドウ (ET)
  entry_start_hour: 10
  entry_start_min: 30
  entry_cutoff_hour: 14
  entry_cutoff_min: 0
  force_close_hour: 15
  force_close_min: 45

  # サイジング
  max_qty: 3
  max_qty_paper: 10
  small_account_usd: 15000
  max_consecutive_losses: 3

  # PnLファイル
  pnl_file: data/ic_sell_pnl.json

# ══════════════════════════════════════════════════════════════════════════════
# Delta Hedge エンジンパラメータ (IntradayMonitor._try_delta_hedge)
# マルチ銘柄対応: mkt.underlying_code に応じて銘柄別オプションコードを生成
# ══════════════════════════════════════════════════════════════════════════════
delta_hedge:
  enable: true

  # 通常時間帯（9:30-14:30 ET）のトリガー閾値
  # |portfolio_delta| > trigger → ヘッジ発動
  # 固定値は禁止。将来的に資金フェーズ・VIX連動で動的化する
  trigger: 0.30
  trigger_late: 0.40     # 14:30 ET以降（Gamma爆発帯）の閾値
  unwind: 0.15           # |portfolio_delta| < unwind → ヘッジ解除

  # 1日最大発動回数（過剰ヘッジ防止）
  daily_max_count: 3

  # PDT週次上限（FINRA PDTルール: 5営業日で3回まで当日往復取引）
  weekly_pdt_budget: 3

  # 緊急ヘッジ閾値: |Delta| > この値 = PDT枠消費してでもヘッジ（$25K未満時）
  emergency_threshold: 0.50

  # ヘッジオプション想定デルタ（ATM near: 0.50）
  contract_delta: 0.50

  # 対応銘柄リスト（フォールバック価格）
  # 実価格はFutu/Finnhubからリアルタイム取得。ここはdry-test用フォールバック
  underlying_fallback_prices:
    SPY: 560.0
    QQQ: 480.0
    IWM: 200.0
    TSLA: 250.0
    NVDA: 900.0
    AAPL: 200.0
    MSFT: 420.0
    AMZN: 200.0
    META: 600.0
    GOOGL: 170.0

# ══════════════════════════════════════════════════════════════════════════════
# ORB エンジンパラメータ (ORBEngine) — マルチ銘柄対応
# mkt.underlying_code に応じて銘柄別に価格取得・チェーン取得・発注コード生成
# ══════════════════════════════════════════════════════════════════════════════
orb_multi_symbol:
  enable: true

  # center_strike±max_strike_deviation_pct を超えるオプションは除外
  # （SPXW混入・スケール不一致防止）
  max_strike_deviation_pct: 0.15

  # deep ITM 価格ガード: option_price >= deep_itm_threshold → 発注拒否
  deep_itm_threshold: 50.0

  # dry-test時フォールバック価格（銘柄別）
  underlying_fallback_prices:
    SPY: 560.0
    QQQ: 480.0
    IWM: 200.0
    TSLA: 250.0
    NVDA: 900.0
    AAPL: 200.0
    MSFT: 420.0
    AMZN: 200.0
    META: 600.0
    GOOGL: 170.0

# ══════════════════════════════════════════════════════════════════════════════
# ORB 1DTE エンジンパラメータ (ORB_1DTEEngine) — 2026-04-18 追加
# 前回 Blinded Backtest で FAIL した orb_breakout (0DTE) を 1DTE 化して再設計。
# バックテスト結果 (ThetaData SPY 1DTE 135日分):
#   - Trades: 70 / Win rate: 60.0% / Sharpe: 2.49 / Max DD: 5.2% / PnL +$1735
#   - 合格基準 (Sharpe>=1.0, WR>=50%, DD<=25%) を全てクリア
# ══════════════════════════════════════════════════════════════════════════════
orb_1dte:
  enable: true
  # エントリー
  delta_target_min: 0.35       # 0DTEは近ATM → 1DTEは 0.35-0.45 OTM
  delta_target_max: 0.45
  delta_target_center: 0.40    # 最適化: 0.40 でプレミアムコスト削減
  # TP/SL  (前回0DTE: TP+50%/SL-50% → FAIL, 1DTE: TP+30%/SL-50% で PASS)
  tp_pct: 0.30                 # +30% で利確
  sl_pct: 0.50                 # -50% で損切り (early-stopを避けるため緩め)
  # ブレイク確定
  orb_window_bars: 3           # 9:30-9:45 の3本を ORB とする (5min x 3)
  consec_bars: 2               # 2本連続で確定 (fake breakout 除外)
  atr_breakout_mult: 0.5       # ATR × 0.5 で buffer (前回0.3% 固定 → ATR比連動)
  # 方向フィルタ
  sma_window: 20               # intraday SMA20 (5min)
  # 満期
  dte_target: 1                # 翌営業日満期
  dte_max: 3                   # 最大3日後（祝日明け等の例外許容）
  # 有効対象銘柄 (WHITELIST: common/symbol_meta.py と一致)
  allowed_symbols:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - AMZN
    - GOOGL
    - META
    - MSFT
    - NVDA
    - TSLA
  # 合格基準 (再検証・並行運用判定に使用)
  pass_criteria:
    sharpe_min: 1.0
    win_rate_min: 0.50
    max_dd_max: 0.25

# ══════════════════════════════════════════════════════════════════════════════
# 市場動向調査 モジュールパラメータ (2026-04-18 追加)
# sector_rotation / options_flow / news_sentiment / econ_events / cross_asset
# ══════════════════════════════════════════════════════════════════════════════

# ── セクターローテーション (common/sector_rotation.py) ────────────────────────
sector_rotation:
  enable: true
  # 対象セクターETF (全11セクターSPDR)
  symbols:
    - XLK   # Technology
    - XLF   # Financials
    - XLE   # Energy
    - XLV   # Health Care
    - XLY   # Consumer Discretionary
    - XLP   # Consumer Staples
    - XLI   # Industrials
    - XLU   # Utilities
    - XLRE  # Real Estate
    - XLB   # Materials
    - XLC   # Communication Services
  # 短期・長期リターンの重み (固定値ではなく起点として使用。ペーパー検証後に動的化)
  weight_5d: 0.6
  weight_20d: 0.4
  # lagging セクター銘柄を credit_spread/ic_sell から除外する
  exclude_lagging_from_tactics:
    - credit_spread
    - iron_condor
  # データ取得失敗時のフォールバック動作
  fallback_regime: neutral

# ── 大口オプションフロー (common/options_flow.py) ──────────────────────────────
options_flow:
  enable: true
  # ブロックトレード閾値 (枚)
  # 参照: FINRAブロックトレード定義・TastyTrade/OptionsFlow系ツール標準値
  block_trade_min_contracts: 500
  # UOA (Unusual Options Activity) 動的閾値パーセンタイル
  uoa_percentile: 90
  # flow_bias がこの値を超えたら戦術の reason に付記
  bias_annotation_threshold: 0.5
  # スコアへの影響ウェイト (最大スコア加算量)
  score_boost_max: 0.03
  # データ取得失敗時のフォールバック
  fallback_bias: 0.0

# ── 個別銘柄ニュースセンチメント (common/news_sentiment.py) ──────────────────
news_sentiment:
  enable: true
  # 過去N時間の記事を対象
  lookback_hours: 24
  # ネガティブ銘柄を除外する戦術
  exclude_negative_from_tactics:
    - credit_spread
    - iron_condor
    - calendar_sell
  # straddle/ORBはネガティブ銘柄を除外しない（ボラ狙い）
  include_negative_for_tactics:
    - straddle_buy
    - orb_buy
  # センチメントスコアの判定閾値
  positive_threshold:  0.2
  negative_threshold: -0.2
  # API失敗時フォールバック
  fallback_label: neutral

# ── 経済イベントカレンダー (common/econ_events.py) ─────────────────────────────
econ_events:
  enable: true
  # ローカルカレンダーJSONパス
  calendar_paths:
    - data/econ_calendar.json
    - data/economic_calendar_2026.json
  # イベント別ブラックアウトウィンドウ (分)
  # 固定値に見えるが「最小安全マージン」。Lucca & Moench 2015 準拠
  blackout_windows:
    FOMC:  {before: 30, after: 60}
    CPI:   {before: 15, after: 30}
    PPI:   {before: 15, after: 30}
    NFP:   {before: 15, after: 30}
    GDP:   {before: 15, after: 30}
    PCE:   {before: 15, after: 30}
    JOLTS: {before: 10, after: 20}
    ISM:   {before: 10, after: 20}
  # straddle_signal を有効にする高インパクトイベント
  high_impact_events:
    - FOMC
    - CPI
    - NFP
    - PPI
    - GDP
  # Finnhub カレンダー自動更新 (weekly)
  auto_update_days_ahead: 60

# ── 先物・商品相関 (common/cross_asset.py) ─────────────────────────────────────
cross_asset:
  enable: true
  # 相関係数算出の窓幅 (日数)
  correlation_window: 30
  # 異常相関判定の z スコア閾値
  anomaly_zscore_threshold: 2.0
  # リスクレジーム判定の regime_score 閾値
  risk_on_threshold:  0.2
  risk_off_threshold: -0.2
  # risk_off 時のsell系戦術 confidence 調整
  risk_off_confidence_penalty: 0.20   # 20% 削減
  # データソース優先順位
  data_sources:
    - databento  # ES/NQ 先物 (要APIキー)
    - yahoo      # 原油/金/BTC
    - local_parquet  # フォールバック
  # 分析対象アセット
  assets:
    - ES    # S&P500 E-mini
    - NQ    # NASDAQ-100 E-mini
    - CL    # WTI 原油
    - GC    # 金
    - BTC   # ビットコイン
