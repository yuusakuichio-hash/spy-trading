# chronos_accounts.yaml — Chronos Multi-Account 設定 (Sora Lab / Chronos)
#
# MFFU 5アカウント並行管理設定。
# 全固定値はこのファイル経由（コード内ハードコード禁止・環境適応型設計規律）。
#
# Copy trading判定回避のための設計:
#   1. timing_jitter_s: 各アカウントで発注タイミングをずらす（秒単位のランダム遅延）
#   2. strategies:      各アカウントで異なる戦術を割り当て（独立判断の証明）
#   3. symbols:         各アカウントで異なる銘柄を優先使用（相関分散）
#   4. vps_ip:          デバイス分離識別子（MFFU「デバイス共有禁止」対応）
#
# MFFU公式規約（2026-04-19直接確認）:
#   - Bot/EA/Algo OK（2025-07-23更新）
#   - HFT禁止・完全無人AI禁止・Copy trading禁止・デバイス共有禁止・ヘッジ禁止
#   Source: https://help.myfundedfutures.com/en/articles/8444599-fair-play-and-prohibited-trading-practices

accounts:
  # ── アカウントA: MFFU Flex ─────────────────────────────────────────────────────
  # 戦術: ORB + VIX Mean Reversion（Flex のConsistency 50%に適した分散戦術）
  - id: mffu_flex_A
    firm: mffu
    plan: flex
    account_size: 50000
    tradovate_creds_ref: mffu_flex_a_creds   # .envのキー名（実資格情報は.envに）
    phase: evaluation
    strategies:
      - orb_breakout
      - vix_mean_reversion
    symbols:
      - MES
    timing_jitter_s: [0, 30]                 # 0〜30秒のランダム遅延
    allowed_windows_et:
      - "10:30-11:00"                        # ORB確定後30分・A+セットアップ帯
    log_path: data/logs/chronos_mffu_flex_A.jsonl
    vps_ip: pre-assigned-A                   # MFFU「デバイス共有禁止」対応の識別子
    enabled: true

  # ── アカウントB: MFFU Rapid ────────────────────────────────────────────────────
  # 戦術: VWAP Reclaim + Liquidity Sweep
  # Rapid = Consistency なし + Intraday trailing → 日中の出来高回帰戦術が合う
  - id: mffu_rapid_B
    firm: mffu
    plan: rapid
    account_size: 50000
    tradovate_creds_ref: mffu_rapid_b_creds
    phase: evaluation
    strategies:
      - vwap_reclaim
      - liquidity_sweep
    symbols:
      - MES
    timing_jitter_s: [60, 120]               # 60〜120秒のランダム遅延
    allowed_windows_et:
      - "09:45-10:15"                        # オープン後の流動性安定帯
    log_path: data/logs/chronos_mffu_rapid_B.jsonl
    vps_ip: pre-assigned-B
    enabled: true

  # ── アカウントC: MFFU Pro ──────────────────────────────────────────────────────
  # 戦術: Session Break + Gap Fill
  # Pro = Consistency なし + EOD trailing → 引け前セッション転換戦術が合う
  - id: mffu_pro_C
    firm: mffu
    plan: pro
    account_size: 50000
    tradovate_creds_ref: mffu_pro_c_creds
    phase: evaluation
    strategies:
      - session_break
      - gap_fill
    symbols:
      - MNQ                                  # NASDAQマイクロ（MESと異なる銘柄）
    timing_jitter_s: [90, 180]               # 90〜180秒のランダム遅延
    allowed_windows_et:
      - "15:40-15:55"                        # 引け前 VIX-MR オーバーナイトウィンドウ
    log_path: data/logs/chronos_mffu_pro_C.jsonl
    vps_ip: pre-assigned-C
    enabled: true

  # ── アカウントD: MFFU Core ─────────────────────────────────────────────────────
  # 戦術: Overnight Gap
  # Core = Consistency 40% → 単日集中を最も避ける設計が必要 → 複数日分散が有効
  # overnight戦術は日跨ぎ複数日参戦で自然にConsistencyを分散させる
  - id: mffu_core_D
    firm: mffu
    plan: core
    account_size: 50000
    tradovate_creds_ref: mffu_core_d_creds
    phase: evaluation
    strategies:
      - overnight_gap
    symbols:
      - MES
    timing_jitter_s: [180, 300]              # 180〜300秒のランダム遅延
    allowed_windows_et:
      - overnight                            # overnight戦術用の特殊キー
    log_path: data/logs/chronos_mffu_core_D.jsonl
    vps_ip: pre-assigned-D
    enabled: true

  # ── アカウントE: MFFU Builder ──────────────────────────────────────────────────
  # 戦術: ORB Breakout / Level Trading / Range Break（Builder intraday制約対応）
  # Builder = overnight禁止・Daily Loss Limit $1,000・Payout Cap $10K
  # 全戦術 intraday 完結（15:55 ET 強制クローズ対応）
  # 選定根拠: data/chronos_builder_strategy_definition_20260420.md
  #   - orb_breakout: 既存実装あり・ORB 1DTE BT で月利12%実績
  #   - level_trading: 既存実装あり・サポレジ反発で低DD
  #   - range_break_long/short: 既存実装あり・レンジ抜け狙い・Consistency分散可
  # 注記: pro_rush は廃止（2026-04-20 CRITICAL修正・未実装戦術のため置換）
  - id: mffu_builder_E
    firm: mffu
    plan: builder
    account_size: 50000
    tradovate_creds_ref: mffu_builder_e_creds
    phase: evaluation
    strategies:
      - orb_breakout
      - level_trading
      - range_break_long
      - range_break_short
    symbols:
      - MES
    timing_jitter_s: [30, 90]               # 30〜90秒のランダム遅延
    allowed_windows_et:
      - "10:30-11:00"
    log_path: data/logs/chronos_mffu_builder_E.jsonl
    vps_ip: pre-assigned-E
    enabled: true
    # Builder 制約（mffu_builder.py の MFFUBuilderRules と同期）
    force_close_et: "15:55"                 # overnight禁止対応
    daily_loss_limit_usd: 1000              # Builder 公式制約
    consistency_max_pct: 0.50              # Builder Consistency Rule
    payout_cap_per_cycle_usd: 2000          # 1サイクル当たり出金上限（保守的）
    sim_total_cap_usd: 10000               # Builder Payout Cap $10K

# ── 合算ルール ────────────────────────────────────────────────────────────────────
# 全アカウント横断のグローバル制約（MFFU未公開のcombined ruleに対するSora Lab自主規律）
combined_rules:
  # MFFU合算Max Loss: 公式未公開のためnull=無効（登録後に公式確認して設定）
  combined_max_loss_usd: null

  # 全アカウント合算の同時発注上限
  max_concurrent_orders: 10

  # Copy trading判定回避: 異なるアカウント間の発注時刻最低間隔（秒）
  # timing_jitter_sと組み合わせてほぼ同時発注を物理的に防ぐ
  inter_account_timing_gap_s: 10

  # 合算週次DD上限（自主規律・MFFU未公開）
  # 5アカウント × $2,000 MLL = $10,000 が理論最大リスク
  # 自主規律として合計 $5,000 を上限とする（理論値の50%）
  combined_weekly_dd_usd: 5000

# ── 人間監視設定 ─────────────────────────────────────────────────────────────────
# MFFU「完全無人AI禁止」対応の人間監視痕跡設定
# chronos_human_oversight.py が参照する
human_oversight:
  # 承認セッションを要求する時刻（ET）
  # 朝: 09:20（マーケットオープン前）/ 昼: 12:00（ランチ帯）/ 引け前: 15:30
  approval_windows_et:
    - "09:20"
    - "12:00"
    - "15:30"

  # 未承認で発注停止するまでの経過時間（時間）
  # 6時間 = 2セッション分（朝承認後、昼を忘れても夕方までは許容）
  max_unapproved_hours: 6

  # 承認ログパス
  log_path: data/logs/human_oversight.jsonl

  # Pushoverで承認リクエストを送信するか
  pushover_enabled: true
