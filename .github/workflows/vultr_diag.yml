name: Vultr API Diagnostics

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Vultr API permission check
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, sys

          API_KEY = os.environ["VULTR_API_KEY"].strip()
          VPS_IP  = os.environ["VPS_IP"].strip()

          def v1(path):
              try:
                  req = urllib.request.Request(
                      f"https://api.vultr.com/v1{path}",
                      headers={"APIKEY": API_KEY}
                  )
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return r.status, json.loads(r.read() or b"{}")
              except urllib.request.HTTPError as e:
                  return e.code, {}
              except Exception as e:
                  return 0, {"error": str(e)}

          def v2(path, method="GET", body=None):
              try:
                  data = json.dumps(body).encode() if body else None
                  req = urllib.request.Request(
                      f"https://api.vultr.com/v2{path}",
                      data=data, method=method,
                      headers={"Authorization": f"Bearer {API_KEY}",
                               "Content-Type": "application/json"}
                  )
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return r.status, json.loads(r.read() or b"{}")
              except urllib.request.HTTPError as e:
                  try:
                      body = e.read()
                      return e.code, json.loads(body or b"{}")
                  except:
                      return e.code, {}
              except Exception as e:
                  return 0, {"error": str(e)}

          print("=== V1 API Tests ===")
          for path in ["/auth/info", "/server/list", "/account/info"]:
              code, data = v1(path)
              print(f"V1 {path}: HTTP {code} → {str(data)[:120]}")

          print("\n=== V2 API Tests ===")
          for path in ["/account", "/instances", "/ssh-keys"]:
              code, data = v2(path)
              print(f"V2 {path}: HTTP {code} → {str(data)[:120]}")

          # If V2 instances works, find the VPS
          code, data = v2("/instances")
          if code == 200:
              for inst in data.get("instances", []):
                  if inst.get("main_ip") == VPS_IP:
                      iid = inst["id"]
                      print(f"\nFound instance: {iid}")
                      # Try to get console URL
                      c2, d2 = v2(f"/instances/{iid}")
                      print(f"Instance detail: {str(d2)[:200]}")
                      break

          # Try V1 SSH key operations
          print("\n=== V1 SSH Key ops ===")
          code, data = v1("/sshkey/list")
          print(f"V1 /sshkey/list: HTTP {code} → {str(data)[:200]}")
          PYEOF
        env:
          VULTR_API_KEY: ${{ secrets.VULTR_API_KEY }}
          VPS_IP: ${{ secrets.VPS_IP }}
