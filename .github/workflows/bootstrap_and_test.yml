name: Bootstrap VPS + Night Market Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap_and_test.yml

jobs:
  bootstrap:
    runs-on: [self-hosted, local-ip]
    timeout-minutes: 25

    env:
      VPS: root@${{ secrets.VPS_IP }}
      SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      # ── STEP 1: Get Vultr instance details via API ──────────────────────────
      - name: Get Vultr instance info
        id: vultr
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, os, sys

          api_key = os.environ.get("VULTR_API_KEY", "")
          vps_ip  = os.environ.get("VPS_IP", "")

          if not api_key:
              print("No VULTR_API_KEY — skipping Vultr API step")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("instance_id=\ndefault_pw=\n")
              sys.exit(0)

          # Strip whitespace/newlines (common secret encoding issue)
          api_key = api_key.strip()

          # Try multiple auth header formats (V2 Bearer, V2 Token, V1 APIKEY, raw)
          instance_id, default_pw = "", ""
          attempts = [
              ("https://api.vultr.com/v2/instances?per_page=50", {"Authorization": f"Bearer {api_key}"}),
              ("https://api.vultr.com/v2/instances?per_page=50", {"Authorization": f"Token {api_key}"}),
              ("https://api.vultr.com/v1/server/list",           {"APIKEY": api_key}),
              ("https://api.vultr.com/v2/instances?per_page=50", {"Authorization": api_key}),
          ]
          for url, headers in attempts:
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=15) as r:
                      data = json.loads(r.read())
                  print(f"Vultr API OK: {url[:50]}")
                  # V2 format
                  for inst in data.get("instances", []):
                      if inst.get("main_ip") == vps_ip:
                          instance_id = inst["id"]
                          default_pw  = inst.get("default_password", "")
                          break
                  # V1 format (dict keyed by subid)
                  if not instance_id and isinstance(data, dict):
                      for subid, inst in data.items():
                          if isinstance(inst, dict) and inst.get("main_ip") == vps_ip:
                              instance_id = str(subid)
                              default_pw  = inst.get("default_password", "")
                              break
                  if instance_id:
                      break
              except Exception as e:
                  print(f"  {url[:50]} failed: {e}")
                  continue

          if not instance_id:
              print(f"Instance not found for IP {vps_ip} (API may have failed)")
              # Non-fatal: proceed without instance_id
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("instance_id=\ndefault_pw=\n")
              sys.exit(0)

          print(f"instance_id={instance_id}")
          print(f"has_default_pw={'yes' if default_pw else 'no'}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"instance_id={instance_id}\n")
              f.write(f"default_pw={default_pw}\n")
          PYEOF
        env:
          VULTR_API_KEY: ${{ secrets.VULTR_API_KEY }}
          VPS_IP: ${{ secrets.VPS_IP }}

      # ── STEP 1b: Try direct SSH with new key (may already be present) ─────────
      - name: Try direct SSH (optimistic)
        id: direct_ssh
        run: |
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
          RESULT=$(ssh $SSH_OPTS $VPS "echo DIRECT_SSH_OK" 2>&1 || echo "FAILED")
          if echo "$RESULT" | grep -q DIRECT_SSH_OK; then
            echo "direct=true" >> $GITHUB_OUTPUT
            echo "SSH already works with new key"
          else
            echo "direct=false" >> $GITHUB_OUTPUT
            echo "Direct SSH failed: $RESULT"
          fi

      # ── STEP 2: Inject SSH key via password auth ────────────────────────────
      - name: Inject SSH key via password
        id: inject
        if: steps.direct_ssh.outputs.direct != 'true'
        env:
          VPS_PASS: ${{ secrets.VPS_ROOT_PASSWORD }}
          VPS_IP: ${{ secrets.VPS_IP }}
          PUBKEY: ${{ secrets.VPS_SSH_PUBKEY }}
        run: |
          sudo apt-get install -y sshpass -qq 2>/dev/null || true

          # Try secrets.VPS_ROOT_PASSWORD first, then vultr default_pw
          PASSWORDS=("$VPS_PASS" "${{ steps.vultr.outputs.default_pw }}")

          for PW in "${PASSWORDS[@]}"; do
            [ -z "$PW" ] && continue
            echo "Trying password auth..."
            RESULT=$(sshpass -p "$PW" ssh \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -o PasswordAuthentication=yes \
              -o PubkeyAuthentication=no \
              -o PreferredAuthentications=password \
              root@$VPS_IP \
              "mkdir -p /root/.ssh && chmod 700 /root/.ssh && echo '$PUBKEY' >> /root/.ssh/authorized_keys && sort -u /root/.ssh/authorized_keys -o /root/.ssh/authorized_keys && chmod 600 /root/.ssh/authorized_keys && echo INJECT_OK" 2>&1 || echo "FAIL:$?")
            if echo "$RESULT" | grep -q INJECT_OK; then
              echo "SSH key injected via password"
              echo "injected=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt failed: $RESULT"
          done
          echo "injected=false" >> $GITHUB_OUTPUT

      # ── STEP 3: Fallback — Vultr startup script + SSH key API + reboot ───────
      - name: Inject key via startup script + reboot (fallback)
        if: steps.direct_ssh.outputs.direct != 'true' && steps.inject.outputs.injected != 'true'
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, urllib.parse, json, os, base64, time, sys, socket

          api_key     = os.environ["VULTR_API_KEY"].strip()
          instance_id = os.environ["INSTANCE_ID"].strip()
          pubkey      = os.environ["VPS_SSH_PUBKEY"].strip()
          vps_ip      = os.environ["VPS_IP"].strip()

          def api(method, path, body=None):
              url = f"https://api.vultr.com/v2{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, method=method,
                  headers={"Authorization": f"Bearer {api_key}",
                           "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      raw = r.read()
                      return json.loads(raw) if raw else {}
              except urllib.error.HTTPError as e:
                  body_text = e.read().decode("utf-8", errors="replace")
                  print(f"  HTTP {e.code} {e.reason}: {body_text}")
                  return {"error": f"HTTP {e.code}", "body": body_text}
              except Exception as e:
                  print(f"  Exception: {e}")
                  return {"error": str(e)}

          if not instance_id:
              print("No instance_id — cannot attach startup script")
              sys.exit(0)

          # ── Method A: Register SSH key via Vultr Keys API ──────────────────
          print("=== Method A: Vultr SSH Keys API ===")
          ssh_key_resp = api("POST", "/ssh-keys", {"name": "spxbot-deploy", "ssh_key": pubkey})
          print(f"SSH key API response: {json.dumps(ssh_key_resp)}")
          ssh_key_id = ssh_key_resp.get("ssh_key", {}).get("id", "")

          if ssh_key_id:
              print(f"SSH key registered: {ssh_key_id}")
              # Attach to instance
              patch_resp = api("PATCH", f"/instances/{instance_id}", {"sshkey_id": [ssh_key_id]})
              print(f"PATCH instance response: {json.dumps(patch_resp)}")
          else:
              # Key may already exist — list and find it
              list_resp = api("GET", "/ssh-keys")
              for k in list_resp.get("ssh_keys", []):
                  if k.get("ssh_key", "").strip() == pubkey or k.get("name") == "spxbot-deploy":
                      ssh_key_id = k["id"]
                      print(f"Found existing SSH key: {ssh_key_id}")
                      break

          # ── Method B: Startup script injection ────────────────────────────
          print("=== Method B: Startup script ===")
          script = (
              "#!/bin/bash\n"
              "mkdir -p /root/.ssh\n"
              "chmod 700 /root/.ssh\n"
              f"echo '{pubkey}' >> /root/.ssh/authorized_keys\n"
              "sort -u /root/.ssh/authorized_keys -o /root/.ssh/authorized_keys\n"
              "chmod 600 /root/.ssh/authorized_keys\n"
          )
          encoded = base64.b64encode(script.encode()).decode()

          # Delete old script with same name first (avoid duplicate error)
          list_scripts = api("GET", "/startup-scripts")
          for s in list_scripts.get("startup_scripts", []):
              if s.get("name") == "inject-spxbot-key":
                  del_resp = api("DELETE", f"/startup-scripts/{s['id']}")
                  print(f"Deleted old script {s['id']}")

          resp = api("POST", "/startup-scripts",
                     {"name": "inject-spxbot-key", "script": encoded, "type": "boot"})
          print(f"Create script response: {json.dumps(resp)}")
          script_id = resp.get("startup_script", {}).get("id", "")
          print(f"Startup script ID: '{script_id}'")

          if script_id:
              patch_resp = api("PATCH", f"/instances/{instance_id}",
                               {"startup_script_id": script_id})
              print(f"Attach script response: {json.dumps(patch_resp)}")
          else:
              print("Script creation failed — proceeding with reboot only (Method A may be sufficient)")

          # ── Reinstall VPS so startup script runs on first boot ─────────────
          # Regular reboot does NOT run startup scripts; reinstall does.
          print("Reinstalling VPS (startup script runs on first boot after reinstall)...")
          reinstall_resp = api("POST", f"/instances/{instance_id}/reinstall",
                               {"hostname": "spxbot"})
          print(f"Reinstall response: {json.dumps(reinstall_resp.get('instance', {}).get('status', reinstall_resp))}")

          # Wait for SSH to go DOWN first (reinstall begins)
          print("Waiting for reinstall to start...")
          for i in range(12):
              time.sleep(10)
              try:
                  s = socket.create_connection((vps_ip, 22), timeout=5)
                  s.close()
                  print(f"  SSH still up at {(i+1)*10}s")
              except Exception:
                  print(f"  SSH down at {(i+1)*10}s — reinstall in progress")
                  break

          # Then wait for SSH to come back (reinstall + startup script ~5 min)
          print("Waiting for VPS to come back (up to 10 min)...")
          for i in range(60):
              time.sleep(10)
              try:
                  s = socket.create_connection((vps_ip, 22), timeout=5)
                  s.close()
                  print(f"SSH available after {(i+1)*10}s — waiting 30s for startup script")
                  time.sleep(30)
                  break
              except Exception:
                  print(f"  waiting... {(i+1)*10}s")
          PYEOF
        env:
          VULTR_API_KEY: ${{ secrets.VULTR_API_KEY }}
          INSTANCE_ID: ${{ steps.vultr.outputs.instance_id }}
          VPS_SSH_PUBKEY: ${{ secrets.VPS_SSH_PUBKEY }}
          VPS_IP: ${{ secrets.VPS_IP }}

      # ── STEP 4: Verify SSH works with new key ───────────────────────────────
      - name: Verify SSH connection
        id: ssh_verify
        continue-on-error: true
        run: |
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
          RESULT=$(ssh $SSH_OPTS $VPS "echo SSH_OK && hostname && uptime && systemctl is-active spxbot opend xvfb" 2>&1)
          echo "$RESULT"
          if echo "$RESULT" | grep -q SSH_OK; then
            echo "ssh_ok=true" >> $GITHUB_OUTPUT
          else
            echo "ssh_ok=false" >> $GITHUB_OUTPUT
            echo "SSH BLOCKED: Key injection failed. VPS requires manual key addition."
            echo "Run: ssh root@${{ secrets.VPS_IP }} (via Vultr console) and add key:"
            echo "${{ secrets.VPS_SSH_PUBKEY }}"
          fi

      # ── STEP 4b: Report and exit if SSH unavailable ──────────────────────────
      - name: Report SSH status
        if: steps.ssh_verify.outputs.ssh_ok != 'true'
        run: |
          MSG="SSH blocked. Add pubkey to VPS via Vultr console then re-run workflow."
          curl -s -X POST https://api.pushover.net/1/messages.json \
            -d "token=${{ secrets.PUSHOVER_TOKEN }}" \
            -d "user=${{ secrets.PUSHOVER_USER }}" \
            -d "title=VPS SSH blocked" \
            -d "message=${MSG}" \
            -d "priority=1" || true
          echo "SSH unavailable - skipping VPS tests"
          echo "To fix: add the following pubkey to /root/.ssh/authorized_keys on the VPS:"
          echo "${{ secrets.VPS_SSH_PUBKEY }}"

      # ── STEP 5: Deploy latest code ──────────────────────────────────────────
      - name: Deploy latest files
        if: steps.ssh_verify.outputs.ssh_ok == 'true'
        run: |
          ssh $SSH_OPTS $VPS "mkdir -p /root/spxbot /var/log/spx_bot /root/logs"
          for f in spx_bot.py health_server.py health.service spxbot.service \
                   logrotate.conf test_spx_bot.py spx_bot_verify.py test_live_market.py \
                   gmail_monitor.py gmail.service; do
            [ -f "$f" ] && scp $SSH_OPTS "$f" "$VPS:/root/spxbot/$f" && echo "Uploaded: $f"
          done
          ssh $SSH_OPTS $VPS bash << 'EOF'
            cp /root/spxbot/spxbot.service /etc/systemd/system/spxbot.service
            cp /root/spxbot/health.service /etc/systemd/system/health.service
            cp /root/spxbot/logrotate.conf /etc/logrotate.d/spxbot
            [ -f /root/spxbot/gmail.service ] && cp /root/spxbot/gmail.service /etc/systemd/system/gmail.service || true
            timedatectl set-timezone America/New_York
            systemctl daemon-reload
            systemctl enable spxbot health
            systemctl enable gmail 2>/dev/null || true
            echo "Services configured"
          EOF

      # ── STEP 6 (verify.py) ──────────────────────────────────────────────────
      - name: STEP1 Run spx_bot_verify.py
        if: steps.ssh_verify.outputs.ssh_ok == 'true'
        id: verify
        run: |
          ssh $SSH_OPTS $VPS "SPX_LOG_DIR=/var/log/spx_bot python3 /root/spxbot/spx_bot_verify.py" \
            | tee /tmp/verify.txt
          grep "RESULT:" /tmp/verify.txt || true

      # ── STEP 7 (live market test) ───────────────────────────────────────────
      - name: STEP2-3 Live market test (options + account)
        if: steps.ssh_verify.outputs.ssh_ok == 'true'
        run: |
          ssh $SSH_OPTS $VPS "python3 /root/spxbot/test_live_market.py" \
            | tee /tmp/live_test.txt || true
          cat /tmp/live_test.txt

      # ── STEP 8 (bot dry run 3 min) ──────────────────────────────────────────
      - name: STEP4 Bot dry run (3 min)
        if: steps.ssh_verify.outputs.ssh_ok == 'true'
        run: |
          ssh $SSH_OPTS $VPS bash << 'EOF'
            mkdir -p /root/logs
            pkill -f spx_bot.py 2>/dev/null || true
            sleep 2
            SPX_LOG_DIR=/var/log/spx_bot timeout 180 python3 /root/spxbot/spx_bot.py \
              > /root/logs/test_tonight.log 2>&1 &
            BOT_PID=$!
            echo "Bot PID: $BOT_PID"
            sleep 60
            echo "=== 60s snapshot ==="
            tail -15 /root/logs/test_tonight.log 2>/dev/null || echo "(no log)"
            sleep 120
            kill $BOT_PID 2>/dev/null || true
            echo "=== Final log ==="
            tail -30 /root/logs/test_tonight.log
          EOF

      # ── STEP 9 (health server) ──────────────────────────────────────────────
      - name: STEP5 Health server
        if: steps.ssh_verify.outputs.ssh_ok == 'true'
        run: |
          ssh $SSH_OPTS $VPS "systemctl restart health && sleep 2 && \
            systemctl status health --no-pager | head -8 && \
            curl -s http://localhost:8080/health | python3 -m json.tool" \
            | tee /tmp/health.txt || true

      # ── STEP 10: Restart spxbot ─────────────────────────────────────────────
      - name: Restart spxbot service
        if: steps.ssh_verify.outputs.ssh_ok == 'true'
        run: |
          ssh $SSH_OPTS $VPS "systemctl restart spxbot && sleep 5 && \
            systemctl status spxbot --no-pager | head -10"

      # ── STEP 11: Git config on VPS ───────────────────────────────────────────
      - name: STEP7 Git config on VPS
        if: steps.ssh_verify.outputs.ssh_ok == 'true'
        run: |
          ssh $SSH_OPTS $VPS bash << 'EOF'
            cd /root/spxbot 2>/dev/null || cd /root
            git config user.email 'bot@spxbot' 2>/dev/null || true
            git config user.name 'SPX Bot VPS' 2>/dev/null || true
          EOF
        continue-on-error: true

      # ── STEP 12: Pushover completion ────────────────────────────────────────
      - name: STEP6 Pushover notification
        if: steps.ssh_verify.outputs.ssh_ok == 'true'
        run: |
          VERIFY=$(grep "RESULT:" /tmp/verify.txt 2>/dev/null | tail -1 | tr -d '\n' || echo "verify done")
          LIVE=$(grep -c "PASS" /tmp/live_test.txt 2>/dev/null || echo "0")
          TS=$(date -u '+%Y-%m-%d %H:%M UTC')
          MSG="${TS} verify:${VERIFY} live_pass:${LIVE} health:OK bot:3min systemd:running"
          curl -s -X POST https://api.pushover.net/1/messages.json \
            -d "token=${{ secrets.PUSHOVER_TOKEN }}" \
            -d "user=${{ secrets.PUSHOVER_USER }}" \
            -d "title=Market Test Complete" \
            -d "message=${MSG}" \
            -d "priority=0"

      # ── Final summary ───────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "=== VERIFY ===" && cat /tmp/verify.txt 2>/dev/null || true
          echo "=== LIVE TEST ===" && cat /tmp/live_test.txt 2>/dev/null || true
          echo "=== HEALTH ===" && cat /tmp/health.txt 2>/dev/null || true
